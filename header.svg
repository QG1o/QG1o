<svg viewBox="0 0 800 100" width="800" height="100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rainbow" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="800" y2="0">
      <stop offset="0%" stop-color="red">
        <animate attributeName="offset" values="0;1;0" dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="20%" stop-color="orange" />
      <stop offset="40%" stop-color="yellow" />
      <stop offset="60%" stop-color="green" />
      <stop offset="80%" stop-color="blue" />
      <stop offset="100%" stop-color="violet" />
    </linearGradient>
  </defs>

  <text
    x="50%"
    y="65%"
    text-anchor="middle"
    font-size="64"
    font-weight="900"
    font-family="Inter, Arial, sans-serif"
    fill="url(#rainbow)">
    Hi, I'm QG1o!
  </text>
</svg>
